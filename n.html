<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html>
<head>
<style>
.card {
  box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
  transition: 0.3s;
  width: 80%;
  max-width: 500px;
  margin: auto;
  font-family: 'Arial', sans-serif;
  border-radius: 10px;
  background-color: #fffaf0;
  padding: 20px;
}

.card:hover {
  box-shadow: 0 8px 16px 0 rgba(0,0,0,0.2);
}

.container {
  padding: 2px 16px;
  text-align: center;
}

h1 {
  color: #c71585;
}

img {
  border-radius: 10px;
  max-width: 100%;
  height: auto;
}

.message {
  margin-top: 20px;
  color: #333;
}
</style>
</head>
<body>

<div class="card">
  <div class="container">
    <h1>Happy Anniversary!</h1>
    <img src="IMG-20260706-WA0009.jpg" alt="Couple" style="width:100%">
    <div class="message">
      <p>Wishing you both endless love, joy, and togetherness.</p>
    </div>
  </div>
</div>

</body>
</html>
